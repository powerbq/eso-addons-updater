name: Build

on:
  push:
    tags:
      - current
      - testing

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: app.exe
          - os: ubuntu-latest
            asset: app
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install FLTK build deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake libx11-dev libxext-dev libxft-dev libxinerama-dev \
            libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev \
            libgl1-mesa-dev libglu1-mesa-dev
      - name: Build
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: cargo build --release
      - name: Stage asset + checksum
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.asset }}" "dist/${{ matrix.asset }}"
          cd dist
          sha256sum "${{ matrix.asset }}" | cut -d' ' -f1 > "${{ matrix.asset }}.sha256"
          printf deprecated > version.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ github.ref_name == 'testing' }}
          make_latest: ${{ github.ref_name == 'current' }}
          files: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
            dist/version.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
